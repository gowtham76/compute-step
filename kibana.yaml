apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: logging
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kibana

  template:
    metadata:
      labels:
        app: kibana

    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.12.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5601

          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.logging.svc.cluster.local:9200

            - name: SERVER_NAME
              value: kibana

            - name: SERVER_HOST
              value: "0.0.0.0"

            - name: TELEMETRY_ENABLED
              value: "false"

          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: logging

spec:
  type: ClusterIP

  selector:
    app: kibana

  ports:
    - protocol: TCP
      port: 5601
      targetPort: 5601
