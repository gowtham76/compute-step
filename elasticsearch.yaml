apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: logging

spec:
  replicas: 1

  selector:
    matchLabels:
      app: elasticsearch

  template:
    metadata:
      labels:
        app: elasticsearch

    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0

          env:
            - name: discovery.type
              value: single-node

            - name: xpack.security.enabled
              value: "false"

            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"

          ports:
            - containerPort: 9200

          volumeMounts:
            - name: elastic-data
              mountPath: /usr/share/elasticsearch/data

      volumes:
        - name: elastic-data
          emptyDir: {}
