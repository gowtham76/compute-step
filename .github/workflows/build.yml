name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ✅ Give permission to Maven wrapper (IMPORTANT)
    - name: Make mvnw executable
      run: chmod +x mvnw

    # ✅ Build project using Maven Wrapper (BEST PRACTICE)
    - name: Build with Maven
      run: ./mvnw clean package -DskipTests
